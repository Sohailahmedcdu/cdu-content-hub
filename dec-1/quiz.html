<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDU Export & Digital Dealership Onboarding - Quiz</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 30px; }
        header { border-bottom: 3px solid #F5C518; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-size: 28px; color: #111; margin-bottom: 5px; }
        .meta { font-size: 13px; color: #666; }
        .question { background: #f9f9f9; padding: 20px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #F5C518; }
        .question h3 { font-size: 16px; margin-bottom: 15px; }
        .option { display: flex; align-items: center; padding: 10px; margin: 8px 0; background: white; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
        .option:hover { background: #f0f0f0; border-color: #F5C518; }
        .option input[type="radio"] { margin-right: 10px; accent-color: #F5C518; }
        .option label { flex: 1; cursor: pointer; margin: 0; }
        button { background: #111; color: white; border: none; padding: 15px 30px; border-radius: 4px; cursor: pointer; font-weight: 600; width: 100%; font-size: 16px; }
        button:hover { background: #333; }
        .results { display: none; background: #f0f0f0; padding: 25px; border-radius: 6px; text-align: center; margin-top: 20px; }
        .results.show { display: block; }
        .score { font-size: 48px; font-weight: bold; color: #F5C518; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Export & Digital Dealership Onboarding - Quiz</h1>
            <p class="meta">December 1, 2025 | CDU ONBOARDING PROGRAM</p>
        </header>
        
        <form id="quizForm">
            <div id="questions"></div>
            <button type="button" onclick="submitQuiz()">Submit Quiz</button>
        </form>
        
        <div class="results" id="results">
            <h2>Your Results</h2>
            <div class="score" id="scoreDisplay"></div>
            <p id="scoreText"></p>
        </div>
    </div>

    <script>
        const questions = [
            { question: "What is the first step before exporting a car?", options: ["a) Get a license", "b) Set up a corporation", "c) Buy a car", "d) Find a buyer"], key: "b" },
            { question: "Which software is used for appraisal in export?", options: ["a) Blue Book", "b) Signal", "c) Kelley", "d) NADA"], key: "b" },
            { question: "What does HST stand for?", options: ["a) High Sales Tax", "b) Harmonized Sales Tax", "c) Heavy Standard Tax", "d) Handling/Service Tax"], key: "b" },
            { question: "Which document is required to open a business bank account?", options: ["a) Driver's license", "b) Corporation documents", "c) Passport", "d) Tax return"], key: "b" },
            { question: "What is a 'green light' in auction terms?", options: ["a) Approval from customs", "b) Your reserve price", "c) Good title status", "d) Vehicle inspection pass"], key: "b" },
            { question: "Which market is currently most profitable for exports?", options: ["a) Europe", "b) Middle East", "c) Africa", "d) South America"], key: "b" },
            { question: "What type of damage should you always avoid?", options: ["a) Dent damage", "b) Paint scratches", "c) Flood/chassis damage", "d) Minor cosmetic"], key: "c" },
            { question: "How long is typical transit time Canada to Middle East?", options: ["a) 20-30 days", "b) 45-50 days", "c) 60-75 days", "d) 90+ days"], key: "b" },
            { question: "Which license type allows local retail sales?", options: ["a) Wholesale", "b) Export", "c) Retail", "d) Dealer"], key: "c" },
            { question: "What should you check first with Signal software?", options: ["a) Price", "b) Duty rate and TPMS", "c) Mileage", "d) Color"], key: "b" }
        ];

        questions.forEach((q, i) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            qDiv.innerHTML = `<h3>${i + 1}. ${q.question}</h3>${q.options.map((opt, j) => `<div class="option"><input type="radio" id="q${i}${j}" name="q${i}" value="${String.fromCharCode(97 + j)}"><label for="q${i}${j}">${opt}</label></div>`).join('')}`;
            document.getElementById('questions').appendChild(qDiv);
        });

        function submitQuiz() {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if (selected && selected.value === q.key) score++;
            });
            const percent = Math.round((score / 10) * 100);
            document.getElementById('scoreDisplay').textContent = percent + '%';
            document.getElementById('scoreText').textContent = `You scored ${score} out of 10.`;
            document.getElementById('results').classList.add('show');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
